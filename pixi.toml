[workspace]
authors = ["jgsimard <jeangab23@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "bajo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
download_assets = "bash scripts/download_assets.sh"
install_prek = "prek install"
fmt = "mojo format ."

# examples
example_lbvh = { cmd = "mojo -I . examples/lbvh_normals.mojo", depends-on = ["download_assets"] }
example_rtiaw = "mojo -I . examples/rtiaw.mojo"

# tests
test = { cmd = "bash scripts/run_tests.sh test/{{suite}}", args = [
  { arg = "suite", default = "."}
] }

test_host = { depends-on = [
  { task = "test", args = ["core"] },
  { task = "test", args = ["obj"] },
  { task = "test", args = ["rt"] },
  { task = "test", args = ["bvh/cpu"] },
] }
test_gpu = { depends-on = [
  { task = "test", args = ["sort"] },
  { task = "test", args = ["bvh/gpu"] },
] }

# sort
bench_sort_mojo = { cmd = "bash -lc 'cd bench/sort && mojo run -I ../.. bench_gpu_sort.mojo'" }
bench_sort_cub = { cmd = "bash -lc 'cd bench/sort && make run-radix'" }
plot_sort = { cmd = "bash -lc 'cd bench/sort && python plot_gpu_sort.py gpu_sort_benchmark_results.csv cub_sort_benchmark_results.csv'" }

# benchmarks
bench_quat = "mojo -I. bench/core/bench_quat.mojo"
bench_aabb = "mojo -I. bench/core/bench_aabb.mojo"
bench_obj = { cmd = "mojo -I. bench/obj/bench_obj.mojo", depends-on = ["download_assets"] }
bench_gpu_sort = "mojo -I. bench/sort/bench_gpu_sort.mojo"
bench_bvh_cpu = "mojo -I . bench/bvh/bench_cpu_bvh.mojo"
bench_bvh_gpu = {cmd = "mojo -I . bench/bvh/bench_gpu_bounds_bvh.mojo",  depends-on = ["download_assets"] }
bench_bvh_gpu_tlas = { cmd = "mojo -I . bench/bvh/bench_gpu_tlas.mojo",  depends-on = ["download_assets"] }
bench_all = { depends-on = [
  "bench_quat",
  "bench_aabb",
  "bench_obj",
  "bench_bvh_cpu",
  "bench_bvh_gpu",
  "bench_bvh_gpu_tlas"
] }
bench_bvh = { depends-on = [
  "bench_bvh_cpu",
  "bench_bvh_gpu",
  "bench_bvh_gpu_tlas"
] }

[dependencies]
mojo = ">=1.0.0b3.dev2026071805,<2"
max = ">=26.5.0.dev2026071805,<27"
python = ">=3.14.6,<3.15"
polars = ">=1.42.1,<2"
matplotlib = ">=3.11.0,<4"
