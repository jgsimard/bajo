[workspace]
authors = ["jgsimard <jeangab23@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "bajo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
download_assets = "bash scripts/download_assets.sh"
install_prek = "prek install"
test = "bash scripts/run_tests.sh"
bench_quat = "mojo -I. bench/core/bench_quat.mojo"
bench_aabb = "mojo -I. bench/core/bench_aabb.mojo"
bench_obj = "mojo -I. bench/bench_obj.mojo"
bench_gpu_sort = "mojo -I. bench/bench_gpu_sort.mojo"
bench_bvh_cpu = "mojo -I . bench/bvh/bench_cpu_bvh.mojo"
bench_bvh_gpu = "mojo -I . bench/bvh/bench_gpu_bounds_bvh.mojo"
bench_bvh_gpu_tlas = "mojo -I . bench/bvh/bench_gpu_tlas.mojo"
bench_all = { depends-on = [
  "bench_quat",
  "bench_aabb",
  "bench_obj",
  "bench_gpu_sort",
  "bench_bvh_cpu",
  "bench_bvh_gpu",
] }
example_lbvh = { cmd = "mojo -I . examples/lbvh_normals.mojo", depends-on = ["download_assets"] }
test_bvh = "bash scripts/run_tests.sh test/bvh"
bench_bvh = { depends-on = [
  "bench_bvh_cpu",
  "bench_bvh_gpu",
  "bench_bvh_gpu_tlas"
] }
fmt = "mojo format ."

[dependencies]
mojo = ">=1.0.0b2.dev2026051806,<2"
max = ">=26.4.0.dev2026051806,<27"
python = ">=3.14.4,<3.15"
