[workspace]
authors = ["jgsimard <jeangab23@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "bajo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install_prek = "prek install"
test = { cmd = "bash run_tests.sh", depends-on = [] }
bench_quat = "mojo -I. bench/bench_quat.mojo"
bench_aabb = "mojo -I. bench/bench_aabb.mojo"

[dependencies]
mojo = ">=0.26.3.0.dev2026041805,<0.27"
max = ">=26.3.0.dev2026041805,<27"
python = ">=3.14.4,<3.15"
suitesparsegetpy = ">=0.1.1,<0.2"
polars = ">=1.39.3,<2"
matplotlib = ">=3.10.8,<4"

[pypi-dependencies]
dearpygui = ">=2.3, <3"
