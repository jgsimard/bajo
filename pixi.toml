[workspace]
authors = ["jgsimard <jeangab23@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "bajo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
download_assets = "bash scripts/download_assets.sh"
install_prek = "prek install"
test = "scripts/run_tests.sh"
check = { depends-on = ["test_host"] }
bench_quat = "mojo -I. bench/core/bench_quat.mojo"
bench_aabb = "mojo -I. bench/core/bench_aabb.mojo"
bench_obj = { cmd = "mojo -I. bench/obj/bench_obj.mojo", depends-on = ["download_assets"] }
bench_gpu_sort = "mojo -I. bench/sort/bench_gpu_sort.mojo"
bench_bvh_cpu = "mojo -I . bench/bvh/bench_cpu_bvh.mojo"
bench_bvh_gpu = {cmd = "mojo -I . bench/bvh/bench_gpu_bounds_bvh.mojo",  depends-on = ["download_assets"] }
bench_bvh_gpu_tlas = { cmd = "mojo -I . bench/bvh/bench_gpu_tlas.mojo",  depends-on = ["download_assets"] }
bench_all = { depends-on = [
  "bench_quat",
  "bench_aabb",
  "bench_obj",
  "bench_gpu_sort",
  "bench_bvh_cpu",
  "bench_bvh_gpu",
  "bench_bvh_gpu_tlas"
] }
example_lbvh = { cmd = "mojo -I . examples/lbvh_normals.mojo", depends-on = ["download_assets"] }
example_rtiaw = "mojo -I . examples/rtiaw.mojo"
test_core = "scripts/run_tests.sh test/core"
test_obj = "scripts/run_tests.sh test/obj"
test_sort = "scripts/run_tests.sh test/sort"
test_rt = "scripts/run_tests.sh test/rt"
test_bvh = "scripts/run_tests.sh test/bvh"
test_bvh_cpu = "scripts/run_tests.sh test/bvh/cpu"
test_bvh_gpu = "scripts/run_tests.sh test/bvh/gpu"
test_host = { depends-on = [
  "test_core",
  "test_obj",
  "test_rt",
  "test_bvh_cpu"
] }
test_gpu = { depends-on = [
  "test_sort",
  "test_bvh_gpu"
] }
bench_bvh = { depends-on = [
  "bench_bvh_cpu",
  "bench_bvh_gpu",
  "bench_bvh_gpu_tlas"
] }
fmt = "mojo format ."

[dependencies]
mojo = ">=1.0.0b3.dev2026070123,<2"
max = ">=26.5.0.dev2026070123,<27"
python = ">=3.14.6,<3.15"
